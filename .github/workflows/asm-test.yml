name: Assembly SDK Test

on:
  push:
    paths:
      - 'clients/asm/**'
      - '.github/workflows/asm-test.yml'
  pull_request:
    paths:
      - 'clients/asm/**'
      - '.github/workflows/asm-test.yml'

jobs:
  test-asm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install NASM and Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm make gcc-multilib

      - name: Build and run test
        run: |
          cd clients/asm
          # Ensure execution permissions for the directory
          chmod -R +x .
          # Execute the test target defined in Makefile
          make test
