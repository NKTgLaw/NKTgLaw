name: Benchmark NKTg

on:
  push:
    paths:
      - 'benchmarks/**'
      - 'core/**'
      - '.github/workflows/benchmark.yml'
  pull_request:
    paths:
      - 'benchmarks/**'
      - 'core/**'

jobs:
  run-benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install build tools
      run: |
        sudo apt update
        sudo apt install -y g++ build-essential

    - name: Compile benchmark
      run: |
        # Using -O3 for maximum optimization during benchmarking
        g++ -O3 benchmarks/benchmark.cpp core/nktg.cpp -Icore -o benchmark_exe

    - name: Run benchmark
      run: |
        # Grant execution permission and run
        chmod +x benchmark_exe
        ./benchmark_exe
