name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Server Dependencies
      run: |
        python -m pip install --upgrade pip
        # Trỏ đúng vào thư mục server_online bạn đang dùng
        if [ -f server/server_online/requirements.txt ]; then 
          pip install -r server/server_online/requirements.txt
        else
          pip install flask
        fi

    - name: Run Server Logic Test
      run: |
        # Kiểm tra xem file app.py có lỗi cú pháp không bằng cách thử import
        python3 -m py_compile server/server_online/app.py
        echo "✅ Python Syntax Check Passed"
