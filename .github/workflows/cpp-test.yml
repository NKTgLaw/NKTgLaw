name: C++ Test

on:
  push:
    paths:
      - 'clients/cpp/**'
      - '.github/workflows/cpp-test.yml'
  pull_request:
    paths:
      - 'clients/cpp/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ build-essential

    - name: Compile Core Test
      run: |
        # Biên dịch test logic lõi, bao gồm thư mục header của SDK
        g++ clients/cpp/tests/test_nktg.cpp -Iclients/cpp/include -o test_core

    - name: Run Core Test
      run: ./test_core

    - name: Compile API Test
      run: |
        # Biên dịch test API
        g++ clients/cpp/tests/test_nktg_api.cpp -Iclients/cpp/include -o test_api

    - name: Run API Test
      run: ./test_api
