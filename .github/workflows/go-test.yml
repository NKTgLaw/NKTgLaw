name: Go SDK Test

on:
  push:
    paths:
      - 'clients/go/**'
      - '.github/workflows/go-test.yml'
  pull_request:
    paths:
      - 'clients/go/**'
      - '.github/workflows/go-test.yml'

jobs:
  test-go:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          # Tự động cache các module để tăng tốc độ chạy CI
          cache: true

      - name: Install dependencies
        run: |
          cd clients/go
          # Chỉ chạy nếu đã có file go.mod
          if [ -f go.mod ]; then go mod download; fi

      - name: Run tests
        run: |
          cd clients/go
          # Chạy tất cả các test và in kết quả chi tiết
          go test -v ./...
