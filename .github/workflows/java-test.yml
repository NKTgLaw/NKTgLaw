name: Java Test

on:
  push:
    paths:
      - 'clients/java/**'
      - '.github/workflows/java-test.yml'
  pull_request:
    paths:
      - 'clients/java/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          # Tự động cache các phụ thuộc Gradle để tăng tốc CI
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x clients/java/gradlew

      - name: Build and Test with Gradle
        run: |
          cd clients/java
          ./gradlew clean test build
