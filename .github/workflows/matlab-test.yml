name: MATLAB Test

on:
  push:
    paths:
      - 'clients/matlab/**'
      - '.github/workflows/matlab-test.yml'
  pull_request:
    paths:
      - 'clients/matlab/**'
      - '.github/workflows/matlab-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v1

      - name: Run MATLAB tests
        uses: matlab-actions/run-tests@v1
        with:
          source-folder: clients/matlab/nktg_law
          select-by-folder: clients/matlab/tests
          test-results-junit: test-results/results.xml
          # Ensures the source code is added to the MATLAB search path
          code-coverage-xml: code-coverage/coverage.xml
