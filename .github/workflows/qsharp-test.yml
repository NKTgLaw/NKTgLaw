name: Q# SDK Test

on:
  push:
    paths:
      - 'clients/qsharp/**'
      - '.github/workflows/qsharp-test.yml'
  pull_request:
    paths:
      - 'clients/qsharp/**'
      - '.github/workflows/qsharp-test.yml'

jobs:
  test-qsharp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Install Quantum Development Kit
        run: |
          # Modern Q# development uses the Microsoft.Quantum.SDK within dotnet
          dotnet tool install -g Microsoft.Quantum.IQSharp
          # Optional: Add tools path to environment
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build and Run Q# tests
        run: |
          cd clients/go
          # Restoring dependencies and running tests for the Quantum project
          dotnet restore
          dotnet test --configuration Release
