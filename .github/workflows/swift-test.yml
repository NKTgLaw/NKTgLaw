name: Swift SDK Test

on:
  push:
    paths:
      - 'clients/swift/**'
      - '.github/workflows/swift-test.yml'
  pull_request:
    paths:
      - 'clients/swift/**'
      - '.github/workflows/swift-test.yml'

jobs:
  test-swift:
    # Using macOS 14 (Apple Silicon) for the fastest Swift compilation
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Swift version
        # Ensures the environment uses a modern Swift version
        run: swift --version

      - name: Build and Run Tests
        run: |
          # Navigate to the Swift SDK directory and run SPM tests
          cd clients/swift
          swift test --enable-code-coverage
