name: Test API

on:
  push:
    paths:
      - 'tests/test_api.http'
      - 'server/**'
      - '.github/workflows/test-api.yml'
  pull_request:
    paths:
      - 'server/**'

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip httpie
        # Using -r requirements.txt if it exists, otherwise install flask
        if [ -f server/requirements.txt ]; then pip3 install -r server/requirements.txt; else pip3 install flask; fi

    - name: Start API server
      run: |
        # Start server in background and redirect logs for debugging
        python3 server/app.py > server.log 2>&1 &
        
        # Health check: Wait for server to be ready (max 30s)
        echo "Waiting for Flask server to start..."
        timeout 30s sh -c 'until curl -s http://localhost:8080/health > /dev/null; do sleep 1; done' || \
        (echo "❌ Server failed to start. Logs:" && cat server.log && exit 1)
        
        echo "✅ Flask server started successfully"

    - name: Run API tests
      run: |
        echo "🔍 Testing /api/momentum"
        http --check-status --json POST http://localhost:8080/api/momentum mass:=5.0 velocity:=3.0

        echo "🔍 Testing /api/nktg1"
        http --check-status --json POST http://localhost:8080/api/nktg1 x:=2.0 momentum:=15.0

        echo "🔍 Testing /api/nktg2"
        http --check-status --json POST http://localhost:8080/api/nktg2 dm_dt:=0.1 momentum:=15.0
