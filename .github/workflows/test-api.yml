name: Test API

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/test-api.yml'
  pull_request:

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip httpie
        if [ -f server/server_online/requirements.txt ]; then 
          pip3 install -r server/server_online/requirements.txt
        else 
          pip3 install flask
        fi

    - name: Start API server
      run: |
        # Chạy app.py từ đúng thư mục server_online
        python3 server/server_online/app.py > server.log 2>&1 &
        
        echo "Waiting for server to start on port 8080..."
        timeout 30s sh -c 'until curl -s http://localhost:8080/health > /dev/null; do sleep 1; done' || \
        (echo "❌ Server failed to start. Logs:" && cat server.log && exit 1)
        echo "✅ Server is UP!"

    - name: Run API tests
      run: |
        echo "🔍 Testing Unified Endpoint /nktg"
        http --check-status --json POST http://localhost:8080/nktg \
          x:=2.0 v:=3.0 m:=5.0 dm_dt:=0.1
